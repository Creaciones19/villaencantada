
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f3f3;
    padding:20px;
}

/* HEADER */

.header{
    margin-bottom:25px;
}

.titulo{
    font-size:32px;
    color:#222;
    margin-bottom:15px;
    font-weight:bold;
}

/* BUSCADOR */

.contenedor-busqueda{

    display:flex;
    gap:12px;
    align-items:center;

}

.buscador{

    flex:1;

    height:58px;

    padding:0 20px;

    border:1px solid #ddd;
    border-radius:14px;

    background:white;

    color:#222;

    font-size:17px;

    outline:none;

}

.buscador:focus{
    border-color:#f5c400;
}

/* BOTÓN */

.limpiar,
.contador{

    height:58px;

    padding:0 24px;

    border:none;
    border-radius:14px;

    background:#ff30a2;

    color:white;

    font-size:16px;
    font-weight:bold;

    display:flex;

    align-items:center;

    justify-content:center;

    white-space:nowrap;

    transition:.2s;

}

.limpiar:hover{

    transform:scale(1.03);

}

/* PRODUCTOS */

.productos{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

    gap:20px;
}

/* CARD */

.card{
    background:white;
    border-radius:8px;
    padding:12px;
    transition:.2s;
    border:1px solid #e5e5e5;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* IMAGEN */

.imagen{
    width:100%;
    height:140px;
    object-fit:contain;
    background:#fafafa;
    margin-bottom:10px;
}

/* INFO */

.info{
    text-align:center;
}

.nombre{
    font-size:16px;
    font-weight:bold;
    color:#222;
    margin-bottom:6px;
}

.codigo{
    font-size:13px;
    color:#777;
    margin-bottom:10px;
}

.precio{
    background:#ffd400;
    color:#111;
    display:inline-block;
    padding:8px 18px;
    font-size:26px;
    font-weight:bold;
    border-radius:6px;
}
/* =========================
   RESPONSIVE DESIGN
========================= */
@media (max-width: 768px){

    body{
        padding:12px;
    }

    .titulo{
        font-size:24px;
        text-align:center;
    }

    .contenedor-busqueda{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        align-items:stretch;
    }

    .buscador{
        width:100%;
        flex:none;
        height:52px;
        font-size:16px;
    }

    .limpiar{
        width:calc(50% - 4px);
        height:42px;
        font-size:13px;
        padding:0 8px;
    }

    .productos{
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:12px;
    }

    .imagen{
        height:110px;
    }

    .precio{
        font-size:20px;
        padding:6px 14px;
    }

    #lector{
        width:100% !important;
        max-width:350px;
    }
}

@media (max-width: 480px){
 
    .productos{
        grid-template-columns:repeat(2,1fr);
    }

    .titulo{
        font-size:20px;
    }

    .card{
        padding:10px;
    }

    .nombre{
        font-size:14px;
    }

    .codigo{
        font-size:12px;
    }

    .precio{
        font-size:18px;
    }
}

</style>
</head>
<body>

<div class="titulo">
    Buscar Productos
</div>

<div class="contenedor-busqueda">

    <input
    type="text"
    id="buscar"
    class="buscador"
    placeholder="Escanee o escriba producto...">

    <button
    id="limpiar"
    class="limpiar">
        Borrar
    </button>

    <button
    id="camara"
    class="limpiar">
        📷 Escanear
    </button>
<div
id="lector"
style="
display:none;
width:300px;
margin-top:10px;
">
    <video
    id="video"
    style="width:100%;">
    </video>
</div>
    <button
    id="cerrarCamara"
    class="limpiar">
        Cerrar cámara
    </button>

    <button
    id="agregar"
    class="limpiar">
        Agregar producto
</button>

<button
    id="editar"
    class="limpiar">
        Editar
</button>

<div
    id="contadorProductos"
    class="contador">
    Productos: 0
</div>

</div>

<div
class="productos"
id="productos">
</div>
<script src="https://unpkg.com/@zxing/library@latest"></script>

    
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  addDoc,
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBEHWiEWstdu6r2D0i4S3CAu2Eyv1q9aaQ",
  authDomain: "tienda-abarroteslamaravilla.firebaseapp.com",
  projectId: "tienda-abarroteslamaravilla",
  storageBucket: "tienda-abarroteslamaravilla.firebasestorage.app",
  messagingSenderId: "1095327917170",
  appId: "1:1095327917170:web:a3dab096621d695b6e0eeb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

 /* AGREGA SONIDO */   
function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
}


 /* CONSTANTES A TRABAJAR */  
let productos = [];
const contenedor =
document.getElementById("productos");

const buscar =
document.getElementById("buscar");

const limpiar =
document.getElementById("limpiar");

const camara =
document.getElementById("camara");

const cerrarCamara =
document.getElementById("cerrarCamara");

const agregar =
document.getElementById("agregar");

const editar =
document.getElementById("editar");

const lector =
document.getElementById("lector");


/* MOSTRAR */
function mostrar(lista){

    contenedor.innerHTML = "";

    if(lista.length === 0){

        const valor = buscar.value.trim();

        contenedor.innerHTML = `
            <div style="
                grid-column:1/-1;
                text-align:center;
                padding:40px;
                font-size:20px;
                font-weight:bold;
                color:#777;
            ">
                Producto no encontrado
                <br><br>

                <button id="btnAbrirAgregar" style="
                    padding:12px 20px;
                    border:none;
                    background:#ff30a2;
                    color:white;
                    border-radius:10px;
                    cursor:pointer;
                    margin:5px;
                ">
                    ➕ Agregar producto
                </button>

                <button id="btnCerrarBusqueda" style="
                    padding:12px 20px;
                    border:none;
                    background:#444;
                    color:white;
                    border-radius:10px;
                    cursor:pointer;
                    margin:5px;
                ">
                    ❌ Cerrar
                </button>
            </div>
        `;

        document.getElementById("btnAbrirAgregar").onclick = () => abrirModalAgregar(valor);

        document.getElementById("btnCerrarBusqueda").onclick = () => {
            buscar.value = "";
            mostrar(productos);
        };

        return;
    }

    lista.forEach(producto => {

        contenedor.innerHTML += `
        <div class="card">

            <img
            src="${producto.imagen || ''}"
            class="imagen">

            <div class="info">

                <div class="nombre">
                    ${producto.nombre || producto.Nombre || "Sin nombre"}
                </div>

                <div class="codigo">
                    Código: ${producto.codigo}
                </div>

                <div class="precio">
                    $${producto.precio}
                </div>

            </div>

        </div>
        `;

    });
}
//
function abrirModalAgregar(valorBusqueda){

    let codigo = "";
    let nombre = "";

    if(/^\d+$/.test(valorBusqueda)){
        codigo = valorBusqueda;
    }else{
        nombre = valorBusqueda;
    }

    let nuevoNombre = nombre;

    if(!nombre){
        nuevoNombre = prompt("Nombre del producto");
        if(!nuevoNombre) return;
    }

    let nuevoCodigo = codigo;

    if(!codigo){
        nuevoCodigo = prompt("Código de barras");
        if(!nuevoCodigo) return;
    }

    const nuevoPrecio = prompt("Precio");
    if(!nuevoPrecio) return;

    const nuevaImagen =
    prompt("Imagen (opcional)") || "";

    addDoc(collection(db,"productos"),{
        nombre: nuevoNombre,
        codigo: nuevoCodigo,
        precio: Number(nuevoPrecio),
        imagen: nuevaImagen
    })
    .then(()=>{
        alert("Producto agregado");
        cargarProductos();
    });

}

/* CARGAR PRODUCTOS DESDE FIREBASE */

async function cargarProductos(){

    try{

        const querySnapshot =
        await getDocs(
            collection(db, "productos")
        );

        productos = [];

        querySnapshot.forEach((docSnap)=>{

            productos.push({
                id: docSnap.id,
                ...docSnap.data()
            });

        });
      productos.sort((a,b)=>
    (a.nombre || a.Nombre || "").localeCompare(b.nombre || b.Nombre || "")
);

/* ACTUALIZAR CONTADOR */
const contador = document.getElementById("contadorProductos");
if(contador){
    contador.textContent = "Productos: " + productos.length;
}

mostrar(productos);

    }

    catch(error){

        console.error(error);

        alert(
            "Error cargando productos desde Firebase"
        );

    }

}
/* BUSCADOR */

buscar.addEventListener(
"input",
()=>{

    const texto =
    buscar.value
    .trim()
    .toLowerCase();

    if(texto === ""){

        mostrar(productos);

        return;

    }

    const filtrados =
    productos.filter(p=>

        String(p.codigo)
        .toLowerCase()
        .includes(texto)

        ||

      (p.nombre || p.Nombre || "")
.toLowerCase()
.includes(texto)
    );

    mostrar(filtrados);

});

/* LIMPIAR */

/* LIMPIAR */

limpiar.addEventListener(
"click",
()=>{

    buscar.value = "";

    mostrar(productos);

    buscar.focus();

});

let scanner = null;

camara.addEventListener("click", async () => {

    try{

        lector.style.display = "block";

        if(scanner) return;

        scanner =
        new ZXing.BrowserMultiFormatReader();

        const devices =
        await scanner.listVideoInputDevices();

        if(devices.length === 0){

            alert("No hay cámara");

            return;

        }

        let cameraId =
        devices[devices.length - 1].deviceId;

        scanner.decodeFromVideoDevice(

            cameraId,

            "video",

            (result,error)=>{

                if(result){

                    const codigo =
                    result.getText();

                    console.log(
                        "DETECTADO:",
                        codigo
                    );

                    beep();

                    navigator.vibrate?.(100);

                    buscar.value =
                    codigo;

                    buscar.dispatchEvent(
                        new Event("input")
                    );

                }

            }

        );

    }

    catch(error){

        console.error(error);

        alert(error.message);

    }

});
/*CERRAR CAMARA */
cerrarCamara.addEventListener(
"click",
()=>{

    if(scanner){

        scanner.reset();

        scanner = null;

    }

    lector.style.display =
    "none";

});




/* AGREGAR PRODUCTO*/
agregar.addEventListener(
"click",
async ()=>{

    const nombre =
    prompt("Nombre del producto");

    if(!nombre) return;

    const codigo =
    prompt("Código de barras");

    if(!codigo) return;

    const precio =
    prompt("Precio");

    if(!precio) return;

    const imagen =
    prompt(
        "Nombre de la imagen (ejemplo: cocacola600ml.webp)"
    );

    if(!imagen) return;

    try{

    await addDoc(

    collection(db, "productos"),

    {
        nombre: nombre,
        codigo: codigo,
        precio: Number(precio),
        imagen: imagen
    }

);

        alert("Producto guardado");

        cargarProductos();

    }

    catch(error){

        console.error(error);

        alert("Error guardando producto");

    }

});
/* EDITAR */
editar.addEventListener(
"click",
async ()=>{

    const buscarProducto =
    prompt(
        "Escribe código o nombre"
    );

    if(!buscarProducto) return;

    const texto =
    buscarProducto
    .toLowerCase()
    .trim();

    const producto =
    productos.find(p =>

        String(p.codigo)
        .toLowerCase()
        .includes(texto)

        ||

        (p.nombre || p.Nombre || "")
        .toLowerCase()
        .includes(texto)

    );

    if(!producto){

        alert(
            "Producto no encontrado"
        );

        return;

    }

    const nuevoNombre =
    prompt(
        "Nombre",
        producto.nombre || producto.Nombre || ""
    );

    if(nuevoNombre === null)
        return;

    const nuevoCodigo =
    prompt(
        "Código",
        producto.codigo
    );

    if(nuevoCodigo === null)
        return;

    const nuevoPrecio =
    prompt(
        "Precio",
        producto.precio
    );

    if(nuevoPrecio === null)
        return;

    const nuevaImagen =
    prompt(
        "Imagen",
        producto.imagen || ""
    );

    if(nuevaImagen === null)
        return;

    try{

        await setDoc(

            doc(
                db,
                "productos",
                producto.id
            ),

            {
                nombre: nuevoNombre,
                codigo: nuevoCodigo,
                precio: Number(nuevoPrecio),
                imagen: nuevaImagen
            }

        );

        alert(
            "Producto actualizado"
        );

        cargarProductos();

    }

    catch(error){

        console.error(error);

        alert(
            "Error al actualizar"
        );

    }

});

/* INICIAR */

cargarProductos();

buscar.focus();

/* SIEMPRE LISTO PARA PISTOLA */

document.addEventListener(
"click",
()=>{

    buscar.focus();

}
);

window.addEventListener(
"load",
()=>{

    buscar.focus();

}
);
</script>

</body>
</html>
```
