
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f3f3;
    padding:20px;
}

/* =========================
   TITULO
========================= */

.titulo{
    font-size:32px;
    color:#222;
    margin-bottom:15px;
    font-weight:bold;
    text-align:center;
}

/* =========================
   BUSCADOR
========================= */

.contenedor-busqueda{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.buscador{
    flex:1;
    min-width:220px;
    height:58px;
    padding:0 20px;
    border:1px solid #ddd;
    border-radius:14px;
    background:white;
    color:#222;
    font-size:17px;
    outline:none;
}

.buscador:focus{
    border-color:#f5c400;
}

/* =========================
   BOTONES
========================= */

.limpiar{
    height:58px;
    padding:0 24px;
    border:none;
    border-radius:14px;
    background:#ff30a2;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.limpiar:hover{
    transform:scale(1.03);
}

/* ➕ BOTÓN AGREGAR (NUEVO) */
#agregarProducto{
    background:#28a745;
}

#agregarProducto:hover{
    background:#1f8a38;
}

/* =========================
   RESULTADOS PRODUCTOS
========================= */

.productos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

/* CARD PRODUCTO */

.card{
    background:white;
    border-radius:8px;
    padding:12px;
    transition:.2s;
    border:1px solid #e5e5e5;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.imagen{
    width:100%;
    height:140px;
    object-fit:contain;
    background:#fafafa;
    margin-bottom:10px;
}

.info{
    text-align:center;
}

.nombre{
    font-size:16px;
    font-weight:bold;
    color:#222;
    margin-bottom:6px;
}

.codigo{
    font-size:13px;
    color:#777;
    margin-bottom:10px;
}

.precio{
    background:#ffd400;
    color:#111;
    display:inline-block;
    padding:8px 18px;
    font-size:26px;
    font-weight:bold;
    border-radius:6px;
}

/* =========================
   PANEL NO ENCONTRADO
========================= */

#noEncontrado{
    display:none;
    text-align:center;
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:12px;
    border:1px solid #ddd;
}

#noEncontrado h2{
    margin-bottom:10px;
}

#codigoNoEncontrado{
    font-size:18px;
    margin-bottom:15px;
    color:#666;
}

#btnGuardarProducto,
#btnCancelar{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

#btnGuardarProducto{
    background:#28a745;
    color:white;
}

#btnCancelar{
    background:#dc3545;
    color:white;
}

/* =========================
   FORMULARIO PRODUCTO
========================= */

#formProducto{
    display:none;
    text-align:center;
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:12px;
    border:1px solid #ddd;
}

#formProducto input{
    width:80%;
    max-width:300px;
    height:45px;
    margin:10px 0;
    padding:0 10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

#guardarProducto{
    background:#007bff;
    color:white;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

#guardarProducto:hover{
    background:#0061cc;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 768px){

    body{
        padding:12px;
    }

    .titulo{
        font-size:24px;
    }

    .contenedor-busqueda{
        flex-direction:column;
        align-items:stretch;
    }

    .buscador{
        width:100%;
        height:52px;
        font-size:16px;
    }

    .limpiar{
        width:100%;
        height:48px;
        font-size:15px;
    }

    .productos{
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:12px;
    }

    .imagen{
        height:110px;
    }

    .precio{
        font-size:20px;
        padding:6px 14px;
    }
}

@media (max-width: 480px){

    .productos{
        grid-template-columns:repeat(2,1fr);
    }

    .titulo{
        font-size:20px;
    }

    .card{
        padding:10px;
    }

    .nombre{
        font-size:14px;
    }

    .codigo{
        font-size:12px;
    }

    .precio{
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="titulo">
    Buscar Productos
</div>

<!-- =========================
     BARRA DE BUSQUEDA
========================= -->
<div class="contenedor-busqueda">

    <input
        type="text"
        id="buscar"
        class="buscador"
        placeholder="Buscar por código o nombre..."
    >

    <button id="camara" class="limpiar">📷 Escanear</button>

    <button id="agregarProducto" class="limpiar">➕ Agregar</button>

    <button id="editarPanel" class="limpiar">✏️ Editar</button>

    <button id="cerrarCamara" class="limpiar">Cerrar cámara</button>

    <button id="limpiar" class="limpiar">Borrar</button>

</div>

<!-- =========================
     CÁMARA
========================= -->
<div id="lector" style="display:none; max-width:500px; margin:20px auto;">
    <video id="video" style="width:100%;"></video>
</div>

<!-- =========================
     RESULTADOS
========================= -->
<div class="productos" id="productos"></div>

<!-- =========================
     PRODUCTO NO ENCONTRADO
========================= -->
<div id="noEncontrado" style="display:none; text-align:center; margin-top:20px;">

    <h2>Producto no encontrado</h2>

    <p id="codigoNoEncontrado"></p>

    <button id="btnGuardarProducto">➕ Guardar producto</button>

    <button id="btnCancelar">❌ Cancelar</button>

</div>

<!-- =========================
     FORMULARIO AGREGAR / EDITAR
========================= -->
<div id="formProducto" style="display:none; text-align:center; margin-top:20px;">

    <h2 id="tituloForm">Guardar producto</h2>

    <input id="nombreProducto" placeholder="Nombre"><br><br>

    <input id="precioProducto" placeholder="Precio"><br><br>

    <button id="guardarProducto">💾 Guardar en Firebase</button>

    <button id="cancelarForm">❌ Cerrar</button>

</div>

<!-- =========================
     PANEL EDITAR
========================= -->
<div id="panelEditar" style="display:none; text-align:center; margin-top:20px;">

    <h2>Editar producto</h2>

    <input id="buscarEditar"
           placeholder="Buscar por nombre o código"
           style="width:80%;max-width:300px;height:45px;padding:10px;margin:10px;border:1px solid #ccc;border-radius:8px;">

    <div id="resultadosEditar"></div>

    <button id="cerrarEditar">❌ Cerrar edición</button>

</div>

</body>
</html>
<script src="https://unpkg.com/@zxing/library@latest"></script>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBEHWiEWstdu6r2D0i4S3CAu2Eyv1q9aaQ",
  authDomain: "tienda-abarroteslamaravilla.firebaseapp.com",
  projectId: "tienda-abarroteslamaravilla",
  storageBucket: "tienda-abarroteslamaravilla.firebasestorage.app",
  messagingSenderId: "1095327917170",
  appId: "1:1095327917170:web:a3dab096621d695b6e0eeb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= DOM ================= */
const contenedor = document.getElementById("productos");
const buscar = document.getElementById("buscar");
const limpiar = document.getElementById("limpiar");

const camara = document.getElementById("camara");
const cerrarCamara = document.getElementById("cerrarCamara");
const lector = document.getElementById("lector");

const noEncontrado = document.getElementById("noEncontrado");
const codigoNoEncontrado = document.getElementById("codigoNoEncontrado");

const formProducto = document.getElementById("formProducto");
const nombreProducto = document.getElementById("nombreProducto");
const precioProducto = document.getElementById("precioProducto");

const btnGuardarProducto = document.getElementById("btnGuardarProducto");
const btnCancelar = document.getElementById("cancelarForm");
const guardarProducto = document.getElementById("guardarProducto");

const agregarBtn = document.getElementById("agregarProducto");
const editarBtn = document.getElementById("editarPanel");
const panelEditar = document.getElementById("panelEditar");
const buscarEditar = document.getElementById("buscarEditar");
const resultadosEditar = document.getElementById("resultadosEditar");
const cerrarEditar = document.getElementById("cerrarEditar");

/* ================= ESTADO ================= */
let scanner = null;
let codigoActual = "";
let modoEdicion = false;

/* ================= BEEP ================= */
function beep() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

/* ================= MOSTRAR PRODUCTO ================= */
function mostrarProducto(data, codigo) {
  contenedor.innerHTML = `
    <div class="card">
      <div class="info">
        <div class="nombre">${data.nombre}</div>
        <div class="codigo">Código: ${codigo}</div>
        <div class="precio">$${data.precio}</div>

        <button onclick="window.editarProducto('${codigo}', '${data.nombre}', ${data.precio})"
          style="margin-top:10px;padding:8px 12px;border:none;border-radius:8px;background:#ff9800;color:white;">
          ✏️ Editar
        </button>
      </div>
    </div>
  `;
}

/* ================= EDITAR GLOBAL ================= */
window.editarProducto = (codigo, nombre, precio) => {
  modoEdicion = true;
  codigoActual = codigo;

  nombreProducto.value = nombre;
  precioProducto.value = precio;

  formProducto.style.display = "block";
  noEncontrado.style.display = "none";
  panelEditar.style.display = "none";
};

/* ================= BUSCAR POR CÓDIGO ================= */
async function buscarPorCodigo(codigo) {
  codigoActual = codigo;

  const ref = doc(db, "productos", codigo);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    mostrarProducto(snap.data(), codigo);
    beep();
    noEncontrado.style.display = "none";
  } else {
    contenedor.innerHTML = "";
    noEncontrado.style.display = "block";
    formProducto.style.display = "none";
    codigoNoEncontrado.innerText = "Código: " + codigo;
  }
}

/* ================= BUSCAR POR NOMBRE ================= */
async function buscarPorNombre(texto) {
  const snap = await getDocs(collection(db, "productos"));

  const resultados = [];

  snap.forEach(docu => {
    const data = docu.data();
    if (data.nombre.toLowerCase().includes(texto.toLowerCase())) {
      resultados.push({ id: docu.id, ...data });
    }
  });

  if (resultados.length === 0) {
    contenedor.innerHTML = "<p>No encontrado</p>";
    return;
  }

  contenedor.innerHTML = resultados.map(p => `
    <div class="card">
      <div class="info">
        <div class="nombre">${p.nombre}</div>
        <div class="codigo">${p.id}</div>
        <div class="precio">$${p.precio}</div>

        <button onclick="window.editarProducto('${p.id}', '${p.nombre}', ${p.precio})"
          style="margin-top:10px;padding:8px;background:#ff9800;color:white;border:none;border-radius:8px;">
          ✏️ Editar
        </button>
      </div>
    </div>
  `).join("");
}

/* ================= INPUT ================= */
buscar.addEventListener("input", () => {
  const v = buscar.value.trim();

  if (!v) {
    contenedor.innerHTML = "";
    return;
  }

  if (/^[0-9]+$/.test(v)) {
    buscarPorCodigo(v);
  } else {
    buscarPorNombre(v);
  }
});

/* ================= LIMPIAR ================= */
limpiar.addEventListener("click", () => {
  buscar.value = "";
  contenedor.innerHTML = "";
});

/* ================= AGREGAR (TOGGLE 100% FUNCIONAL) ================= */
agregarBtn.addEventListener("click", () => {

  const estaAbierto =
    window.getComputedStyle(formProducto).display !== "none";

  // 🔴 SI ESTÁ ABIERTO → LO CIERRA
  if (estaAbierto) {
    formProducto.style.display = "none";

    nombreProducto.value = "";
    precioProducto.value = "";

    return;
  }

  // 🟢 SI ESTÁ CERRADO → LO ABRE LIMPIO
  modoEdicion = false;
  codigoActual = "";

  nombreProducto.value = "";
  precioProducto.value = "";

  formProducto.style.display = "block";

  // cerrar otros paneles
  noEncontrado.style.display = "none";
  panelEditar.style.display = "none";
  lector.style.display = "none";
});
/* ================= EDITAR PANEL ================= */
editarBtn.addEventListener("click", () => {
  panelEditar.style.display = "block";
});

/* cerrar editar */
cerrarEditar?.addEventListener("click", () => {
  panelEditar.style.display = "none";
});

/* búsqueda dentro de editar */
buscarEditar?.addEventListener("input", async () => {
  const texto = buscarEditar.value.trim();

  if (!texto) {
    resultadosEditar.innerHTML = "";
    return;
  }

  const snap = await getDocs(collection(db, "productos"));

  let html = "";

  snap.forEach(docu => {
    const d = docu.data();

    if (
      d.nombre.toLowerCase().includes(texto.toLowerCase()) ||
      docu.id.includes(texto)
    ) {
      html += `
        <div class="card">
          <div class="info">
            <div class="nombre">${d.nombre}</div>
            <div class="codigo">${docu.id}</div>
            <div class="precio">$${d.precio}</div>

            <button onclick="window.editarProducto('${docu.id}', '${d.nombre}', ${d.precio})"
              style="margin-top:10px;padding:8px;background:#ff9800;color:white;border:none;border-radius:8px;">
              ✏️ Editar
            </button>
          </div>
        </div>
      `;
    }
  });

  resultadosEditar.innerHTML = html || "<p>No encontrado</p>";
});

/* ================= GUARDAR / EDITAR ================= */
guardarProducto.addEventListener("click", async () => {
  const nombre = nombreProducto.value.trim();
  const precio = parseFloat(precioProducto.value);

  if (!nombre || isNaN(precio)) {
    alert("Completa los campos");
    return;
  }

  if (!codigoActual && !modoEdicion) {
    codigoActual = Date.now().toString();
  }

  await setDoc(doc(db, "productos", codigoActual), {
    nombre,
    precio
  });

  alert(modoEdicion ? "Actualizado" : "Guardado");

  formProducto.style.display = "none";

  buscarPorCodigo(codigoActual);
});

/* ================= NO ENCONTRADO ================= */
btnGuardarProducto.addEventListener("click", () => {
  formProducto.style.display = "block";
  noEncontrado.style.display = "none";
});

/* ================= CANCELAR ================= */
btnCancelar.addEventListener("click", () => {
  formProducto.style.display = "none";
  noEncontrado.style.display = "none";
});

/* ================= CÁMARA ================= */
camara.addEventListener("click", async () => {
  lector.style.display = "block";

  if (scanner) return;

  scanner = new ZXing.BrowserMultiFormatReader();
  const devices = await scanner.listVideoInputDevices();

  const cameraId = devices[devices.length - 1].deviceId;

  scanner.decodeFromVideoDevice(cameraId, "video", (result) => {
    if (result) {
      const codigo = result.getText();

      buscar.value = codigo;
      buscarPorCodigo(codigo);

      beep();
    }
  });
});

/* ================= CERRAR CÁMARA ================= */
cerrarCamara.addEventListener("click", () => {
  if (scanner) {
    scanner.reset();
    scanner = null;
  }
  lector.style.display = "none";
});

</script>
</body>
</html>
```
