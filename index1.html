<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Código de Barras</title>

    <script src="https://cdn.jsdelivr.net/npm/dynamsoft-javascript-barcode@9.0.0/dist/dbr.js"></script>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            font-family:Arial, Helvetica, sans-serif;
            padding:20px;
        }

        #barcodeScanner{
            width:100%;
            max-width:500px;
            height:400px;
            border:1px solid #ccc;
        }

        #result{
            margin-top:20px;
            font-size:18px;
            font-weight:bold;
            text-align:center;
        }
    </style>
</head>

<body>

    <div id="barcodeScanner">
        <span id="loading-status">
            Cargando cámara...
        </span>
    </div>

    <div id="result">
        Resultado: N/A
    </div>

    <script>

        Dynamsoft.DBR.BarcodeReader.license =
        "DLS2eyJoYW5kc2hha2VDb2RlIjoiMjAwMDAxLTE2NDk4Mjk3OTI2MzUiLCJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSIsInNlc3Npb25QYXNzd29yZCI6IndTcGR6Vm05WDJrcEQ5YUoifQ==";

        let scanner;

        window.onload = async function(){

            try{

                await Dynamsoft.DBR.BarcodeScanner.loadWasm();

                scanner = await Dynamsoft.DBR.BarcodeScanner.createInstance();

                document
                    .getElementById("barcodeScanner")
                    .appendChild(scanner.getUIElement());

                document
                    .getElementById("loading-status")
                    .hidden = true;

                scanner.onFrameRead = results => {

                    for(let result of results){

                        document.getElementById("result").innerHTML =
                            "Resultado: " +
                            result.barcodeFormatString +
                            " | " +
                            result.barcodeText;
                    }
                };

              scanner.onUnduplicatedRead = (txt,result)=>{

    alert("CODIGO LEIDO: " + txt);

    document.getElementById("result").innerHTML =
        "Resultado: " + txt;
};
                await scanner.show();

              setTimeout(()=>{

    let selector =
        document.getElementsByClassName(
            "dbrScanner-sel-camera"
        );

    if(selector.length > 0){
        selector[0].hidden = true;
    }

},1000);

            }
            catch(error){

                console.error(error);
                alert(error.message);

            }

        };

    </script>

</body>

</html>
