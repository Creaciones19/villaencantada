<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f3f3;
    padding:20px;
}

/* HEADER */

.header{
    margin-bottom:25px;
}

.titulo{
    font-size:32px;
    color:#222;
    margin-bottom:15px;
    font-weight:bold;
}

.buscador{
    width:100%;
    padding:16px 20px;
    border:1px solid #ddd;
    border-radius:12px;
    background:white;
    color:#222;
    font-size:18px;
    outline:none;
}

.buscador:focus{
    border-color:#f5c400;
}

/* PRODUCTOS */

.productos{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

    gap:20px;
}

/* CARD */

.card{
    background:white;
    border-radius:6px;
    padding:12px;
    transition:.2s;
    border:1px solid #e5e5e5;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* IMAGEN */

.imagen{
    width:100%;
    height:140px;
    object-fit:contain;
    background:#fafafa;
    margin-bottom:10px;
}

/* INFO */

.info{
    text-align:center;
}

.nombre{
    font-size:16px;
    font-weight:bold;
    color:#222;
    margin-bottom:6px;
}

.codigo{
    font-size:13px;
    color:#777;
    margin-bottom:10px;
}

.precio{
    background:#ffd400;
    color:#111;
    display:inline-block;
    padding:8px 18px;
    font-size:26px;
    font-weight:bold;
    border-radius:4px;
}

</style>
</head>

<body>

<div class="header">

    <div class="titulo">
        Buscar Productos
    </div>

    <input
    type="text"
    id="buscar"
    class="buscador"
    placeholder="Escanee o escriba producto...">

</div>

<div class="productos" id="productos"></div>

<script>

/* PRODUCTOS */

const productos = [

{
    codigo:"750004",
    nombre:"Agua Bonafont",
    precio:15,
    imagen:"https://i.imgur.com/Zh8X8k8.png"
},

{
    codigo:"750001",
    nombre:"Coca Cola 600ml",
    precio:18,
    imagen:"https://i.imgur.com/5KXcQYm.png"
},

{
    codigo:"750005",
    nombre:"Oreo",
    precio:25,
    imagen:"https://i.imgur.com/eG0QY6K.png"
},

{
    codigo:"750002",
    nombre:"Pepsi 400ml",
    precio:17,
    imagen:"https://i.imgur.com/nT8FQ6Y.png"
},

{
    codigo:"750003",
    nombre:"Sabritas Original",
    precio:20,
    imagen:"https://i.imgur.com/3QX8jQS.png"
}

];

/* ORDENAR ALFABÉTICAMENTE */

productos.sort((a,b)=>
a.nombre.localeCompare(b.nombre)
);

const contenedor =
document.getElementById("productos");

const buscar =
document.getElementById("buscar");

/* MOSTRAR */

function mostrar(lista){

    contenedor.innerHTML = "";

    lista.forEach(producto=>{

        contenedor.innerHTML += `

        <div class="card">

            <img
            src="${producto.imagen}"
            class="imagen">

            <div class="info">

                <div class="nombre">
                    ${producto.nombre}
                </div>

                <div class="codigo">
                    Código: ${producto.codigo}
                </div>

                <div class="precio">
                    $${producto.precio}
                </div>

            </div>

        </div>

        `;

    });

}

/* MOSTRAR TODOS */

mostrar(productos);

/* BUSCADOR */

buscar.addEventListener("input", ()=>{

    let texto =
    buscar.value.trim().toLowerCase();

    /* BUSCAR */

    let filtrados = productos.filter(p =>

        p.codigo === texto ||

        p.nombre.toLowerCase().includes(texto)

    );

    mostrar(filtrados);

    /* SI ES CÓDIGO ESCANEADO */

    let codigoEncontrado = productos.find(p =>
        p.codigo === texto
    );

    if(codigoEncontrado){

        setTimeout(()=>{

            buscar.value = "";

            mostrar(productos);

            buscar.focus();

        },500);

    }

});

/* FOCUS AUTOMÁTICO */

buscar.focus();

</script>
</body>
</html>
