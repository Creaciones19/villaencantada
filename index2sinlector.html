<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";


import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    updateDoc,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/*==========================
FIREBASE
==========================*/

const firebaseConfig = {

    apiKey: "AIzaSyBEHWiEWstdu6r2D0i4S3CAu2Eyv1q9aaQ",

    authDomain: "tienda-abarroteslamaravilla.firebaseapp.com",

    projectId: "tienda-abarroteslamaravilla",

    storageBucket: "tienda-abarroteslamaravilla.firebasestorage.app",

    messagingSenderId: "1095327917170",

    appId: "1:1095327917170:web:a3dab096621d695b6e0eeb"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/*==========================
VARIABLES
==========================*/

let productos = [];

let productoActual = null;

let editando = false;



let camaraAbierta = false;

/*==========================
ELEMENTOS
==========================*/

const buscar = document.getElementById("buscar");

const btnBuscar = document.getElementById("btnBuscar");

const btnEscanear = document.getElementById("btnEscanear");

const btnCerrar = document.getElementById("btnCerrar");

const btnAgregar = document.getElementById("btnAgregar");

const btnLimpiar = document.getElementById("btnLimpiar");

const contenedor = document.getElementById("contenedor");

const contador = document.getElementById("contador");

const mensaje = document.getElementById("mensaje");

const reader = document.getElementById("reader");

/*==========================
MODAL
==========================*/

const modal = document.getElementById("modal");

const modalImagen = document.getElementById("modalImagen");

const modalNombre = document.getElementById("modalNombre");

const modalCodigo = document.getElementById("modalCodigo");

const modalPrecio = document.getElementById("modalPrecio");

const modalArchivo = document.getElementById("modalArchivo");

const editar = document.getElementById("editar");

const eliminar = document.getElementById("eliminar");

const cerrar = document.getElementById("cerrar");

/*==========================
FORMULARIO
==========================*/

const formulario = document.getElementById("formulario");

const tituloFormulario = document.getElementById("tituloFormulario");

const nombre = document.getElementById("nombre");

const codigo = document.getElementById("codigo");

const precio = document.getElementById("precio");

const imagen = document.getElementById("imagen");

const guardar = document.getElementById("guardar");

const cancelar = document.getElementById("cancelar");

/*==========================
SONIDO
==========================*/


 /* AGREGA SONIDO */   
function beep() {

    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();

    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.value = 1200;

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.value = 0.2;

    osc.start();

    setTimeout(() => {

        osc.stop();
        ctx.close();

    }, 80);

}
/*==========================
ACTUALIZAR CONTADOR
==========================*/

function actualizarContador(lista = productos){

    contador.textContent =
    "📦 " + lista.length + " Productos";

}

/*==========================
MENSAJE
==========================*/

function mostrarMensaje(texto){

    mensaje.textContent = texto;

    mensaje.style.display = "block";

}

function ocultarMensaje(){

    mensaje.style.display = "none";

}

/*==========================
ABRIR FORMULARIO
==========================*/

/*==========================
ABRIR FORMULARIO
==========================*/

function abrirFormulario(){

    formulario.style.display = "flex";

    nombre.focus();

    nombre.select();

}
/*==========================
CERRAR FORMULARIO
==========================*/

function cerrarFormulario(){

    formulario.style.display = "none";

}

/*==========================
LIMPIAR FORMULARIO
==========================*/

function limpiarFormulario(){

    nombre.value = "";

    codigo.value = "";

    precio.value = "";

    imagen.value = "";

    editando = false;

    productoActual = null;

    tituloFormulario.textContent = "Agregar producto";

}

/*==========================
ABRIR MODAL
==========================*/

function abrirModal(producto){

    productoActual = producto;

    modalImagen.src = producto.imagen;

    modalNombre.textContent = producto.nombre;

    modalCodigo.textContent = producto.codigo;

    modalPrecio.textContent = producto.precio;

    modalArchivo.textContent = producto.imagen;

    modal.style.display = "flex";

}

/*==========================
CERRAR MODAL
==========================*/

function cerrarModal(){

    modal.style.display = "none";

}

/*==========================
SONIDO
==========================*/


/*==========================
VIBRACIÓN
==========================*/

function vibrar(){

    if(navigator.vibrate){

        navigator.vibrate(200);

    }

}
/*==================================================
CARGAR PRODUCTOS DESDE FIREBASE
==================================================*/

async function cargarProductos(){

    try{

        mostrarMensaje("Cargando productos...");

        productos = [];

        const consulta = await getDocs(
            collection(db,"productos")
        );

        consulta.forEach(documento=>{

            productos.push({

                id: documento.id,

                ...documento.data()

            });

        });

        productos.sort((a,b)=>{

            const n1 = (a.nombre || "").toLowerCase();

            const n2 = (b.nombre || "").toLowerCase();

            return n1.localeCompare(n2);

        });

        actualizarContador(productos);

        renderProductos(productos);

    }

    catch(error){

        console.error(error);

        mostrarMensaje("Error cargando productos");

    }

}

/*==================================================
RENDER RÁPIDO
==================================================*/

function renderProductos(lista){

    contenedor.innerHTML="";

    if(lista.length===0){

        mostrarMensaje("No hay productos");

        return;

    }

    ocultarMensaje();

    let indice = 0;

    const bloque = 20;

    function pintar(){

        const fragment = document.createDocumentFragment();

        for(

            let i=0;

            i<bloque && indice<lista.length;

            i++,indice++

        ){

            const producto = lista[indice];

            const tarjeta = crearTarjeta(producto);

            fragment.appendChild(tarjeta);

        }

        contenedor.appendChild(fragment);

        if(indice<lista.length){

            requestAnimationFrame(pintar);

        }

    }

    pintar();

}

/*==================================================
CREAR TARJETA
==================================================*/

function crearTarjeta(producto){

    const div = document.createElement("div");

    div.className="card";

    let foto = producto.imagen;

    if(!foto){

        foto="https://via.placeholder.com/300x300?text=Sin+Imagen";

    }

    div.innerHTML=`

        <img
        src="${foto}"
        loading="lazy">

        <div class="card-body">

            <h3>

                ${producto.nombre}

            </h3>

            <p>

                Código:
                ${producto.codigo}

            </p>

            <p>

                Precio:
                $${producto.precio}

            </p>

        </div>

    `;

    div.onclick=()=>{

        abrirModal(producto);

    };

    return div;

}

/*==================================================
INICIAR
==================================================*/

window.addEventListener(

"load",

()=>{

    cargarProductos();

    buscar.focus();

}

);

/*==================================================
EVENTOS
==================================================*/

// Abrir formulario para agregar
btnAgregar.onclick = () => {

    limpiarFormulario();

    abrirFormulario();

};

// Cancelar formulario
cancelar.onclick = () => {

    cerrarFormulario();

};

// Cerrar modal
cerrar.onclick = () => {

    cerrarModal();

};

// Cerrar modal al tocar fuera
modal.onclick = (e) => {

    if (e.target === modal) {

        cerrarModal();

    }

};

/*==================================================
EDITAR
==================================================*/

editar.onclick = () => {

    if (!productoActual) return;

    editando = true;

    nombre.value = productoActual.nombre;
    codigo.value = productoActual.codigo;
    precio.value = productoActual.precio;
    imagen.value = productoActual.imagen || "";

    tituloFormulario.textContent = "Editar producto";

    cerrarModal();

    abrirFormulario();

};

/*==================================================
GUARDAR
==================================================*/
/*==================================================
GUARDAR
==================================================*/

guardar.onclick = async () => {

    if (
        nombre.value.trim() === "" ||
        codigo.value.trim() === ""
    ) {
        alert("Complete nombre y código.");
        return;
    }

    // Buscar si el código ya existe
    const codigoNuevo = codigo.value.trim();

    const repetido = productos.find(p =>

        p.codigo === codigoNuevo &&

        (!editando || p.id !== productoActual.id)

    );

    if (repetido) {

        alert("Ese código ya existe.");

        codigo.focus();

        return;

    }

    const datos = {

        nombre: nombre.value.trim(),

        codigo: codigoNuevo,

        precio: Number(precio.value) || 0,

        imagen: imagen.value.trim()

    };

    try {

        if (editando) {

            await updateDoc(

                doc(db, "productos", productoActual.id),

                datos

            );

        } else {

            await addDoc(

                collection(db, "productos"),

                datos

            );

        }

        cerrarFormulario();

        limpiarFormulario();

        cargarProductos();

    } catch (error) {

        console.error(error);

        alert("Error al guardar.");

    }

};

/*==================================================
ELIMINAR
==================================================*/

eliminar.onclick = async () => {

    if (!productoActual) return;

    if (!confirm("¿Eliminar este producto?")) return;

    try {

        await deleteDoc(

            doc(db, "productos", productoActual.id)

        );

        cerrarModal();

        cargarProductos();

    } catch (error) {

        console.error(error);

        alert("No se pudo eliminar.");

    }

};
/*==================================================
BUSCAR EN TIEMPO REAL
==================================================*/

function buscarProductos() {

    const texto = buscar.value.trim().toLowerCase();

    if (texto === "") {

        renderProductos(productos);

        actualizarContador(productos);

        return;

    }

    const resultado = productos.filter(producto =>

        (producto.nombre || "").toLowerCase().includes(texto) ||

        (producto.codigo || "").toLowerCase().includes(texto)

    );

    renderProductos(resultado);

    actualizarContador(resultado);

}

buscar.addEventListener("input", buscarProductos);

btnBuscar.onclick = buscarProductos;
/*==================================================
BOTÓN LIMPIAR
==================================================*/

btnLimpiar.onclick = () => {

    buscar.value = "";

    renderProductos(productos);

    actualizarContador(productos);

    buscar.focus();

};
/*==================================================
ENTER PARA GUARDAR
==================================================*/

formulario.addEventListener("keydown", e => {

    if (e.key === "Enter") {

        e.preventDefault();

        guardar.click();

    }

});

/*==================================================
ENTER CAMBIA AL SIGUIENTE CAMPO
==================================================*/

const campos = [nombre, codigo, precio, imagen];

campos.forEach((campo, indice) => {

    campo.addEventListener("keydown", e => {

        if (e.key !== "Enter") return;

        e.preventDefault();

        if (indice < campos.length - 1) {

            campos[indice + 1].focus();

        } else {

            guardar.click();

        }

    });

});
/*==================================================
ESC PARA CERRAR
==================================================*/

document.addEventListener("keydown", e => {

    if (e.key === "Escape") {

        cerrarFormulario();

        cerrarModal();

    }

});
/*==================================================
ESCANEAR CÓDIGO
==================================================*/
/*==================================================
ESCÁNER UNIVERSAL
Teléfono + Tablet + Computadora + Pistola
==================================================*/
let codeReader = null;
let escaneado = false;

btnEscanear.onclick = async () => {

    if (camaraAbierta) return;

    escaneado = false;

    try {

        reader.style.display = "block";
        btnCerrar.style.display = "inline-block";

        camaraAbierta = true;

       const hints = new Map();

hints.set(
    ZXing.DecodeHintType.POSSIBLE_FORMATS,
   [

        // Supermercados (México)
        ZXing.BarcodeFormat.EAN_13,

        // Productos pequeños
        ZXing.BarcodeFormat.EAN_8,

        // Etiquetas propias (Canva u otras)
        ZXing.BarcodeFormat.CODE_128,

        // ZXing.BarcodeFormat.UPC_A,   // Productos de EE.UU.
        // ZXing.BarcodeFormat.UPC_E,   // UPC reducido
        // ZXing.BarcodeFormat.CODE_39  // Uso industrial

    ]
);

codeReader =
new ZXing.BrowserMultiFormatReader(hints);

        const devices = await codeReader.listVideoInputDevices();

        if (devices.length === 0) {

            alert("No se encontró ninguna cámara.");

            cerrarCamara();

            return;

        }

        // Usa la última cámara (normalmente la trasera)
        const cameraId =
    devices.length > 1
        ? devices[devices.length - 1].deviceId
        : devices[0].deviceId;

        await codeReader.decodeFromVideoDevice(

    cameraId,

    "reader",

    (resultado, error) => {

        if (!resultado || escaneado) return;

        escaneado = true;

        const codigoEscaneado =
            (resultado.getText?.() || resultado.text).trim();

        beep();
        vibrar();

        buscar.value = codigoEscaneado;

        buscarProductos();

        const producto = productos.find(
    p => String(p.codigo).trim() === String(codigoEscaneado).trim()
);

      // Comparación anterior.
// Si algún día la necesitas otra vez, puedes descomentarla.
/*
const producto = productos.find(
    p => String(p.codigo).trim() === codigoEscaneado
);
*/
        cerrarCamara();

        if (producto) {

            setTimeout(() => {

                abrirModal(producto);

            }, 300);

        } else {

            if (confirm("Producto no encontrado.\n\n¿Desea agregarlo?")) {

                limpiarFormulario();

                codigo.value = codigoEscaneado;

                abrirFormulario();

                nombre.focus();

            }

        }

    }

);
    } catch (error) {

        console.error(error);

        alert(
    "No fue posible abrir la cámara.\n\n" +
    (error?.message || error)
);

        cerrarCamara();

    }

};
function cerrarCamara() {

    if (codeReader) {

        try {

            codeReader.reset();

        } catch (e) {}

        codeReader = null;

    }

    camaraAbierta = false;
    escaneado = false;

    reader.style.display = "none";
    btnCerrar.style.display = "none";

}

btnCerrar.onclick = cerrarCamara;

buscar.addEventListener("keydown", (e) => {

    if (e.key !== "Enter") return;

    e.preventDefault();

    const texto = buscar.value.trim();

    if (!texto) return;

    beep();
    vibrar();

    // Buscar por nombre o código
    buscarProductos();

    // Si escribió un código exacto, abrir el modal
const producto = productos.find(
    p => String(p.codigo).trim() === texto
);

if (producto) {

    abrirModal(producto);

} else {

    if (confirm("Producto no encontrado.\n\n¿Desea agregarlo?")) {

        limpiarFormulario();

        // Si sólo tiene números, es un código
        if (/^\d+$/.test(texto)) {

            codigo.value = texto;
            nombre.focus();

        } else {

            // Si tiene letras, es un nombre
            nombre.value = texto;
            codigo.focus();

        }

        abrirFormulario();

    }

}
});
/*==================================================
FOCO AUTOMÁTICO PARA PISTOLA LECTORA
==================================================*/

// Al abrir la página
window.addEventListener("load", () => {

    buscar.focus();

});

// Si el usuario hace clic en cualquier parte,
// vuelve el foco al buscador (excepto cuando escribe en formularios)
document.addEventListener("click", (e) => {

    if (
        formulario.style.display === "flex" ||
        modal.style.display === "flex"
    ) return;

    const etiqueta = e.target.tagName;

    if (
        etiqueta !== "INPUT" &&
        etiqueta !== "TEXTAREA"
    ) {

        buscar.focus();

    }

});

// Si la ventana vuelve a estar activa
window.addEventListener("focus", () => {

    if (
        formulario.style.display !== "flex" &&
        modal.style.display !== "flex"
    ) {

        buscar.focus();

    }

});
</script>
