

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f3f3;
    padding:20px;
}

/* HEADER */

.header{
    margin-bottom:25px;
}

.titulo{
    font-size:32px;
    color:#222;
    margin-bottom:15px;
    font-weight:bold;
}

/* BUSCADOR */

.contenedor-busqueda{

    display:flex;
    gap:12px;
    align-items:center;

}

.buscador{

    flex:1;

    height:58px;

    padding:0 20px;

    border:1px solid #ddd;
    border-radius:14px;

    background:white;

    color:#222;

    font-size:17px;

    outline:none;

}

.buscador:focus{
    border-color:#f5c400;
}

/* BOTÓN */

.limpiar{

    height:58px;

    padding:0 24px;

    border:none;
    border-radius:14px;

    background:#ff30a2;

    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:.2s;

}

.limpiar:hover{

    transform:scale(1.03);

}

/* PRODUCTOS */

.productos{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

    gap:20px;
}

/* CARD */

.card{
    background:white;
    border-radius:8px;
    padding:12px;
    transition:.2s;
    border:1px solid #e5e5e5;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* IMAGEN */

.imagen{
    width:100%;
    height:140px;
    object-fit:contain;
    background:#fafafa;
    margin-bottom:10px;
}

/* INFO */

.info{
    text-align:center;
}

.nombre{
    font-size:16px;
    font-weight:bold;
    color:#222;
    margin-bottom:6px;
}

.codigo{
    font-size:13px;
    color:#777;
    margin-bottom:10px;
}

.precio{
    background:#ffd400;
    color:#111;
    display:inline-block;
    padding:8px 18px;
    font-size:26px;
    font-weight:bold;
    border-radius:6px;
}
/* =========================
   RESPONSIVE DESIGN
========================= */

@media (max-width: 768px){

    body{
        padding:12px;
    }

    .titulo{
        font-size:24px;
        text-align:center;
    }

    .contenedor-busqueda{
        flex-direction:column;
        align-items:stretch;
    }

    .buscador{
        width:100%;
        height:52px;
        font-size:16px;
    }

    .limpiar{
        width:100%;
        height:48px;
        font-size:15px;
    }

    .productos{
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:12px;
    }

    .imagen{
        height:110px;
    }

    .precio{
        font-size:20px;
        padding:6px 14px;
    }

    #lector{
        width:100% !important;
    }
}

@media (max-width: 480px){

    .productos{
        grid-template-columns:repeat(2,1fr);
    }

    .titulo{
        font-size:20px;
    }

    .card{
        padding:10px;
    }

    .nombre{
        font-size:14px;
    }

    .codigo{
        font-size:12px;
    }

    .precio{
        font-size:18px;
    }
}


</style>
</head>

<div id="modalAgregar" style="
display:none;

top:0;

background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
">

<div style="
background:white;
padding:20px;

width:300px;
">

<h3>Agregar producto</h3>

<input id="mNombre" placeholder="Nombre" style="width:100%;margin:5px 0;padding:8px;">
<input id="mCodigo" placeholder="Código" style="width:100%;margin:5px 0;padding:8px;">

<script type="module">
/*######################################################################
#
#  SISTEMA DE INVENTARIO - LA MARAVILLA
#  VERSIÓN 3.0
#
#  SECCIÓN 1 - CONFIGURACIÓN GENERAL
#
######################################################################*/


/*==============================================================
= 1.1 IMPORTAR FIREBASE
==============================================================*/

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import{
    getFirestore,
    collection,
    getDocs,
    addDoc,
    setDoc,
    deleteDoc,
    doc,
    onSnapshot
}from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";


/*==============================================================
= 1.2 CONFIGURACIÓN FIREBASE
==============================================================*/

const firebaseConfig={

    apiKey:"AIzaSyBEHWiEWstdu6r2D0i4S3CAu2Eyv1q9aaQ",

    authDomain:"tienda-abarroteslamaravilla.firebaseapp.com",

    projectId:"tienda-abarroteslamaravilla",

    storageBucket:"tienda-abarroteslamaravilla.firebasestorage.app",

    messagingSenderId:"1095327917170",

    appId:"1:1095327917170:web:a3dab096621d695b6e0eeb"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);


/*==============================================================
= 1.3 VARIABLES GLOBALES
==============================================================*/

let productos=[];

let scanner=null;

let modoScanner="";

let cargando=false;

let renderizando=false;

let timeoutBusqueda=null;


/*==============================================================
= 1.4 ÍNDICES RÁPIDOS
==============================================================*/

const indiceCodigo=new Map();

const indiceId=new Map();


/*==============================================================
= 1.5 REFERENCIAS DEL DOM
==============================================================*/

const contenedor=document.getElementById("productos");

const buscar=document.getElementById("buscar");

const camara=document.getElementById("camara");

const cerrarCamara=document.getElementById("cerrarCamara");

const agregar=document.getElementById("agregar");

const editar=document.getElementById("editar");

const eliminar=document.getElementById("eliminar");

const limpiar=document.getElementById("limpiar");

const contador=document.getElementById("contador");

const lector=document.getElementById("lector");

const video=document.getElementById("video");


/*==============================================================
= 1.6 SONIDO
==============================================================*/

function beep(){

    const audio=new Audio(
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );

    audio.play();

}


/*==============================================================
= 1.7 CONTADOR
==============================================================*/

function actualizarContador(){

    contador.textContent=
        "Productos: "+productos.length;

}
/*==============================================================
= 2.5 ACTUALIZAR PRODUCTO EN MEMORIA
==============================================================*/

function actualizarProductoLocal(producto){

    const posicion = productos.findIndex(
        p => p.id === producto.id
    );

    if(posicion >= 0){

        productos[posicion] = producto;

    }else{

        productos.push(producto);

    }

    ordenarProductos();

    indexarProductos();

    actualizarContador();

    renderProductos(productos);

}


/*==============================================================
= 2.6 ELIMINAR PRODUCTO DE MEMORIA
==============================================================*/

function eliminarProductoLocal(id){

    productos = productos.filter(
        p => p.id !== id
    );

    ordenarProductos();

    indexarProductos();

    actualizarContador();

    renderProductos(productos);

}
/*######################################################################
#
#  SECCIÓN 3 - MOTOR DE RENDERIZADO
#
######################################################################*/


/*==============================================================
= 3.1 CREAR TARJETA DE PRODUCTO
==============================================================*/

function crearCard(producto){

    return `
        <div class="card">

            <img
                class="imagen"
                loading="lazy"
                src="${producto.imagen || ""}"
                onerror="this.src='https://via.placeholder.com/180x140?text=Sin+Imagen'"
            >

            <div class="info">

                <div class="nombre">
                    ${producto.nombre || producto.Nombre || ""}
                </div>

                <div class="codigo">
                    ${producto.codigo || ""}
                </div>

                <div class="precio">
                    $${producto.precio || 0}
                </div>

            </div>

        </div>
    `;

}


/*==============================================================
= 3.2 RENDERIZAR PRODUCTOS
==============================================================*/

function renderProductos(lista){

    if(renderizando){

        return;

    }

    renderizando = true;

    requestAnimationFrame(()=>{

        contenedor.innerHTML = lista
            .map(crearCard)
            .join("");

        renderizando = false;

    });

}
/*######################################################################
#
#  SECCIÓN 4 - BUSCADOR INTELIGENTE
#
######################################################################*/


/*==============================================================
= 4.1 BUSCAR PRODUCTOS
==============================================================*/

function buscarProductos(texto){

    const filtro = texto
        .trim()
        .toLowerCase();

    if(filtro === ""){

        renderProductos(productos);

        return;

    }

    const resultados = productos.filter(producto=>{

        const nombre = String(
            producto.nombre || producto.Nombre || ""
        ).toLowerCase();

        const codigo = String(
            producto.codigo || ""
        ).toLowerCase();

        return nombre.includes(filtro)
            || codigo.includes(filtro);

    });

    renderProductos(resultados);

}


/*==============================================================
= 4.2 BÚSQUEDA CON RETARDO
==============================================================*/

function iniciarBusqueda(){

    clearTimeout(timeoutBusqueda);

    timeoutBusqueda = setTimeout(()=>{

        buscarProductos(buscar.value);

    },150);

}


/*==============================================================
= 4.3 LIMPIAR BÚSQUEDA
==============================================================*/

function limpiarBusqueda(){

    buscar.value = "";

    renderProductos(productos);

    buscar.focus();

}


/*==============================================================
= 4.4 EVENTOS DEL BUSCADOR
==============================================================*/

buscar.addEventListener("input", iniciarBusqueda);

limpiar.addEventListener("click", limpiarBusqueda);
/*######################################################################
#
#  SECCIÓN 5 - ESCÁNER DE CÓDIGO DE BARRAS
#
######################################################################*/


/*==============================================================
= 5.1 INICIAR ESCÁNER
==============================================================*/

async function iniciarScanner(){

    if(scanner){

        detenerScanner();

    }

    lector.style.display = "block";

    scanner = new ZXing.BrowserMultiFormatReader();

    try{

        await scanner.decodeFromVideoDevice(

            null,

            video,

            (resultado,error)=>{

                if(resultado){

                    beep();

                    buscar.value = resultado.getText();

                    buscarProductos(resultado.getText());

                    detenerScanner();

                }

            }

        );

    }

    catch(error){

        console.error(error);

        alert("No fue posible abrir la cámara.");

    }

}


/*==============================================================
= 5.2 DETENER ESCÁNER
==============================================================*/

function detenerScanner(){

    if(scanner){

        scanner.reset();

        scanner = null;

    }

    lector.style.display = "none";

}


/*==============================================================
= 5.3 EVENTOS DEL ESCÁNER
==============================================================*/

camara.addEventListener(

    "click",

    iniciarScanner

);

cerrarCamara.addEventListener(

    "click",

    detenerScanner

);
/*######################################################################
#
#  SECCIÓN 6 - CARGAR PRODUCTOS
#
######################################################################*/


/*==============================================================
= 6.1 LIMPIAR ÍNDICES
==============================================================*/

function limpiarIndices(){

    indiceCodigo.clear();
    indiceId.clear();

}


/*==============================================================
= 6.2 INDEXAR PRODUCTOS
==============================================================*/

function indexarProductos(){

    limpiarIndices();

    for(const producto of productos){

        const codigo = String(
            producto.codigo ?? ""
        ).trim();

        if(codigo !== ""){

            indiceCodigo.set(
                codigo,
                producto
            );

        }

        indiceId.set(
            producto.id,
            producto
        );

    }

}


/*==============================================================
= 6.3 ORDENAR PRODUCTOS
==============================================================*/

function ordenarProductos(){

    productos.sort((a,b)=>{

        const nombreA = (
            a.nombre ||
            a.Nombre ||
            ""
        ).toLowerCase();

        const nombreB = (
            b.nombre ||
            b.Nombre ||
            ""
        ).toLowerCase();

        return nombreA.localeCompare(
            nombreB,
            "es"
        );

    });

}


/*==============================================================
= 6.4 CARGAR PRODUCTOS
==============================================================*/

async function cargarProductos(){

    if(cargando){

        return;

    }

    cargando = true;

    try{

        const consulta = await getDocs(

            collection(
                db,
                "productos"
            )

        );

        productos = [];

        consulta.forEach(documento=>{

            productos.push({

                id: documento.id,

                ...documento.data()

            });

        });

        ordenarProductos();

        indexarProductos();

        actualizarContador();

        renderProductos(productos);

    }

    catch(error){

        console.error(error);

        alert("Error cargando productos.");

    }

    finally{

        cargando = false;

    }

}
/*######################################################################
#
#  SECCIÓN 7 - AGREGAR PRODUCTOS
#
######################################################################*/


/*==============================================================
= 7.1 REFERENCIAS DEL MODAL
==============================================================*/

const modalAgregar = document.getElementById("modalAgregar");

const mNombre = document.getElementById("mNombre");

const mCodigo = document.getElementById("mCodigo");

const mPrecio = document.getElementById("mPrecio");

const mImagen = document.getElementById("mImagen");

const btnGuardarModal = document.getElementById("btnGuardarModal");

const btnCerrarModal = document.getElementById("btnCerrarModal");


/*==============================================================
= 7.2 ABRIR MODAL
==============================================================*/

function abrirModalAgregar(){

    modalAgregar.style.display = "flex";

    mNombre.value = "";

    mCodigo.value = "";

    mPrecio.value = "";

    mImagen.value = "";

    mNombre.focus();

}


/*==============================================================
= 7.3 CERRAR MODAL
==============================================================*/

function cerrarModalAgregar(){

    modalAgregar.style.display = "none";

}


/*==============================================================
= 7.4 GUARDAR PRODUCTO
==============================================================*/

async function guardarProducto(){

    const producto={

        nombre:mNombre.value.trim(),

        codigo:mCodigo.value.trim(),

        precio:Number(mPrecio.value)||0,

        imagen:mImagen.value.trim()

    };

    if(producto.nombre===""){

        alert("Escriba el nombre.");

        return;

    }

    if(producto.codigo===""){

        alert("Escriba el código.");

        return;

    }

    try{

        const referencia=await addDoc(

            collection(db,"productos"),

            producto

        );

        producto.id=referencia.id;

        actualizarProductoLocal(producto);

        cerrarModalAgregar();

        beep();

    }

    catch(error){

        console.error(error);

        alert("No fue posible guardar el producto.");

    }

}


/*==============================================================
= 7.5 EVENTOS
==============================================================*/

agregar.addEventListener(

    "click",

    abrirModalAgregar

);

btnCerrarModal.addEventListener(

    "click",

    cerrarModalAgregar

);

btnGuardarModal.addEventListener(

    "click",

    guardarProducto

);
/*######################################################################
#
#  SECCIÓN 8 - EDITAR PRODUCTOS
#
######################################################################*/


/*==============================================================
= 8.1 PRODUCTO EN EDICIÓN
==============================================================*/

let productoEditando = null;


/*==============================================================
= 8.2 ABRIR EDITOR
==============================================================*/

function abrirEditor(){

    const codigo = buscar.value.trim();

    if(codigo === ""){

        alert("Escriba o escanee un código.");

        return;

    }

    const producto = indiceCodigo.get(codigo);

    if(!producto){

        alert("Producto no encontrado.");

        return;

    }

    productoEditando = producto;

    modalAgregar.style.display = "flex";

    mNombre.value = producto.nombre || "";

    mCodigo.value = producto.codigo || "";

    mPrecio.value = producto.precio || "";

    mImagen.value = producto.imagen || "";

    btnGuardarModal.textContent = "ACTUALIZAR";

    mNombre.focus();

}


/*==============================================================
= 8.3 ACTUALIZAR PRODUCTO
==============================================================*/

async function actualizarProducto(){

    if(!productoEditando){

        return;

    }

    const producto = {

        id: productoEditando.id,

        nombre: mNombre.value.trim(),

        codigo: mCodigo.value.trim(),

        precio: Number(mPrecio.value) || 0,

        imagen: mImagen.value.trim()

    };

    if(producto.nombre === ""){

        alert("Escriba el nombre.");

        return;

    }

    if(producto.codigo === ""){

        alert("Escriba el código.");

        return;

    }

    try{

        await setDoc(

            doc(

                db,

                "productos",

                producto.id

            ),

            producto

        );

        actualizarProductoLocal(producto);

        productoEditando = null;

        cerrarModalAgregar();

        beep();

    }

    catch(error){

        console.error(error);

        alert("No fue posible actualizar el producto.");

    }

}


/*==============================================================
= 8.4 MODIFICAR GUARDAR
==============================================================*/

const guardarProductoOriginal = guardarProducto;

guardarProducto = async function(){

    if(productoEditando){

        await actualizarProducto();

        return;

    }

    await guardarProductoOriginal();

};


/*==============================================================
= 8.5 MODIFICAR ABRIR MODAL
==============================================================*/

const abrirModalAgregarOriginal = abrirModalAgregar;

abrirModalAgregar = function(){

    productoEditando = null;

    btnGuardarModal.textContent = "GUARDAR";

    abrirModalAgregarOriginal();

};


/*==============================================================
= 8.6 EVENTO EDITAR
==============================================================*/

editar.addEventListener(

    "click",

    abrirEditor

);
/*######################################################################
#
#  SECCIÓN 9 - ELIMINAR PRODUCTOS
#
######################################################################*/


/*==============================================================
= 9.1 BUSCAR PRODUCTO
==============================================================*/

function obtenerProductoSeleccionado(){

    const codigo = buscar.value.trim();

    if(codigo === ""){

        alert("Escriba o escanee un código.");

        return null;

    }

    const producto = indiceCodigo.get(codigo);

    if(!producto){

        alert("Producto no encontrado.");

        return null;

    }

    return producto;

}


/*==============================================================
= 9.2 ELIMINAR PRODUCTO
==============================================================*/

async function eliminarProducto(){

    const producto = obtenerProductoSeleccionado();

    if(!producto){

        return;

    }

    const confirmar = confirm(

        "¿Eliminar el producto?\n\n" +

        producto.nombre +

        "\n\nEsta acción no se puede deshacer."

    );

    if(!confirmar){

        return;

    }

    try{

        await deleteDoc(

            doc(

                db,

                "productos",

                producto.id

            )

        );

        eliminarProductoLocal(

            producto.id

        );

        buscar.value = "";

        beep();

        alert("Producto eliminado correctamente.");

    }

    catch(error){

        console.error(error);

        alert("No fue posible eliminar el producto.");

    }

}


/*==============================================================
= 9.3 EVENTO BOTÓN ELIMINAR
==============================================================*/

eliminar.addEventListener(

    "click",

    eliminarProducto

);
/*######################################################################
#
#  SECCIÓN 10 - INICIALIZACIÓN DEL SISTEMA
#
######################################################################*/


/*==============================================================
= 10.1 INICIAR APLICACIÓN
==============================================================*/

async function iniciarAplicacion(){

    try{

        await cargarProductos();

        buscar.value = "";

        buscar.focus();

        actualizarContador();

    }

    catch(error){

        console.error(error);

        alert("No fue posible iniciar el sistema.");

    }

}


/*==============================================================
= 10.2 ATAJOS DE TECLADO
==============================================================*/

document.addEventListener("keydown",(evento)=>{

    // Buscar rápidamente
    if(evento.key==="/"){

        evento.preventDefault();

        buscar.focus();

    }

    // Limpiar búsqueda
    if(evento.key==="Escape"){

        limpiarBusqueda();

        detenerScanner();

        cerrarModalAgregar();

    }

    // Abrir agregar producto
    if(evento.ctrlKey && evento.key.toLowerCase()==="n"){

        evento.preventDefault();

        abrirModalAgregar();

    }

});


/*==============================================================
= 10.3 ACTUALIZAR AL VOLVER A LA PESTAÑA
==============================================================*/

document.addEventListener("visibilitychange",()=>{

    if(document.visibilityState==="visible"){

        cargarProductos();

    }

});


/*==============================================================
= 10.4 CARGAR AL INICIAR
==============================================================*/

window.addEventListener(

    "load",

    iniciarAplicacion

);


/*==============================================================
= 10.5 LIMPIAR CÁMARA AL SALIR
==============================================================*/

window.addEventListener(

    "beforeunload",

    detenerScanner

);
/*######################################################################
#
#  SECCIÓN 10 - INICIALIZACIÓN DEL SISTEMA
#
######################################################################*/


/*==============================================================
= 10.1 ATAJOS DE TECLADO
==============================================================*/

document.addEventListener("keydown",(e)=>{

    // F2 = Buscar
    if(e.key==="F2"){

        e.preventDefault();

        buscar.focus();

    }

    // ESC = Cerrar cámara y modal
    if(e.key==="Escape"){

        detenerScanner();

        cerrarModalAgregar();

    }

    // ENTER = Buscar inmediatamente
    if(e.key==="Enter" && document.activeElement===buscar){

        buscarProductos(buscar.value);

    }

});


/*==============================================================
= 10.2 CARGA INICIAL
==============================================================*/

async function iniciarSistema(){

    try{

        await cargarProductos();

        iniciarSincronizacion();

        buscar.value="";

        buscar.focus();

        actualizarContador();

        console.log("Sistema iniciado correctamente.");

    }


    catch(error){

        console.error(error);
