<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba BarcodeDetector</title>

<style>
body{
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

video{
    width:100%;
    max-width:500px;
    border:2px solid #000;
}

#resultado{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>Prueba de Código de Barras</h1>

<button id="iniciar">
    Iniciar Cámara
</button>

<br><br>

<video id="video" autoplay playsinline muted></video>

<div id="resultado">
    Esperando...
</div>

<script>

const video = document.getElementById("video");
const resultado = document.getElementById("resultado");

document.getElementById("iniciar").addEventListener("click", async () => {

    try{

        resultado.innerHTML = "Solicitando cámara...";

        if(!("BarcodeDetector" in window)){

            resultado.innerHTML =
            "BarcodeDetector NO disponible";

            return;
        }

        const stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:{
                    ideal:"environment"
                }
            }

        });

        video.srcObject = stream;

        await video.play();

        resultado.innerHTML =
        "Cámara iniciada";

        const detector =
        new BarcodeDetector({

            formats:[
                "ean_13",
                "ean_8",
                "code_128",
                "code_39",
                "upc_a",
                "upc_e",
                "qr_code"
            ]

        });

        setInterval(async()=>{

            try{

                const codigos =
                await detector.detect(video);

                if(codigos.length > 0){

                    resultado.innerHTML =
                    "Código: " +
                    codigos[0].rawValue;

                }

            }catch(error){

                console.log(error);

            }

        },300);

    }catch(error){

        resultado.innerHTML =
        "ERROR: " +
        error.message;

        console.error(error);

    }

});

</script>

</body>
</html>
