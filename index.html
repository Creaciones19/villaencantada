
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f3f3;
    padding:20px;
}

/* HEADER */

.titulo{
    font-size:32px;
    color:#222;
    margin-bottom:15px;
    font-weight:bold;
}

/* BUSCADOR */

.contenedor-busqueda{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
}

.buscador{
    flex:1;
    height:58px;
    padding:0 20px;
    border:1px solid #ddd;
    border-radius:14px;
    background:white;
    color:#222;
    font-size:17px;
    outline:none;
}

.buscador:focus{
    border-color:#f5c400;
}

/* =========================
   BOTONES (UNIFICADO)
========================= */

.limpiar,
.contador,
#editar,
#editarCamara,
#agregar,
#camara,
#cerrarCamara{

    height:58px;
    padding:0 24px;
    border:none;
    border-radius:14px;
    background:#ff30a2;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;

    display:flex;
    align-items:center;
    justify-content:center;

    white-space:nowrap;
}

.limpiar:hover,
#editar:hover,
#editarCamara:hover,
#agregar:hover,
#camara:hover,
#cerrarCamara:hover{
    transform:scale(1.03);
}

/* CONTADOR (igual estilo pero sin hover) */

.contador{
    cursor:default;
    background:#ff30a2;
}

/* PRODUCTOS */

.productos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

/* CARD */

.card{
    background:white;
    border-radius:8px;
    padding:12px;
    transition:.2s;
    border:1px solid #e5e5e5;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* IMAGEN */

.imagen{
    width:100%;
    height:140px;
    object-fit:contain;
    background:#fafafa;
    margin-bottom:10px;
}

/* INFO */

.info{
    text-align:center;
}

.nombre{
    font-size:16px;
    font-weight:bold;
    color:#222;
    margin-bottom:6px;
}

.codigo{
    font-size:13px;
    color:#777;
    margin-bottom:10px;
}

.precio{
    background:#ffd400;
    color:#111;
    display:inline-block;
    padding:8px 18px;
    font-size:26px;
    font-weight:bold;
    border-radius:6px;
}

/* =========================
   RESPONSIVE DESIGN
========================= */

@media (max-width: 768px){

    body{
        padding:12px;
    }

    .titulo{
        font-size:24px;
        text-align:center;
    }

    .contenedor-busqueda{
        flex-wrap:wrap;
        gap:8px;
    }

    .buscador{
        width:100%;
        flex:none;
        height:52px;
        font-size:16px;
    }

    /* BOTONES EN MOVIL */
    .limpiar,
    .contador,
    #editar,
    #editarCamara,
    #agregar,
    #camara,
    #cerrarCamara{
        width:calc(50% - 4px);
        height:42px;
        font-size:13px;
        padding:0 8px;
    }

    .productos{
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:12px;
    }

    .imagen{
        height:110px;
    }

    .precio{
        font-size:20px;
        padding:6px 14px;
    }

    #lector{
        width:100% !important;
        max-width:350px;
    }
}

@media (max-width: 480px){

    .productos{
        grid-template-columns:repeat(2,1fr);
    }

    .titulo{
        font-size:20px;
    }

    .card{
        padding:10px;
    }

    .nombre{
        font-size:14px;
    }

    .codigo{
        font-size:12px;
    }

    .precio{
        font-size:18px;
    }
}

</style>
</head>
<body>

<div class="titulo">
    Buscar Productos
</div>

<div class="contenedor-busqueda">

    <input
    type="text"
    id="buscar"
    class="buscador"
    placeholder="Escanee o escriba producto...">

    <button
    id="limpiar"
    class="limpiar">
        Borrar
    </button>

    <button
    id="camara"
    class="limpiar">
        📷 Escanear
    </button>

    <div
    id="lector"
    style="
    display:none;
    width:300px;
    margin-top:10px;
    ">
        <video
        id="video"
        style="width:100%;">
        </video>
    </div>

    <button
    id="cerrarCamara"
    class="limpiar">
        Cerrar cámara
    </button>

    <button
    id="agregar"
    class="limpiar">
        Agregar producto
    </button>

  <button id="editar" class="limpiar">

</button>

<button id="editarCamara" class="limpiar">
    📷 Editar con cámara
</button>

    <div
    id="contadorProductos"
    class="contador">
        Productos: 0
    </div>

</div>

<div
class="productos"
id="productos">
</div>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  addDoc,
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBEHWiEWstdu6r2D0i4S3CAu2Eyv1q9aaQ",
  authDomain: "tienda-abarroteslamaravilla.firebaseapp.com",
  projectId: "tienda-abarroteslamaravilla",
  storageBucket: "tienda-abarroteslamaravilla.firebasestorage.app",
  messagingSenderId: "1095327917170",
  appId: "1:1095327917170:web:a3dab096621d695b6e0eeb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SONIDO */
function beep() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

/* VARIABLES */
let productos = [];

const contenedor = document.getElementById("productos");
const buscar = document.getElementById("buscar");
const limpiar = document.getElementById("limpiar");
const camara = document.getElementById("camara");
const cerrarCamara = document.getElementById("cerrarCamara");
const agregar = document.getElementById("agregar");
const editar = document.getElementById("editar");
const editarCamara = document.getElementById("editarCamara");
const lector = document.getElementById("lector");

let scanner = null;

/* ================= MOSTRAR ================= */
function mostrar(lista){

  contenedor.innerHTML = "";

  if(lista.length === 0){

    const valor = buscar.value.trim();

    contenedor.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;">
        Producto no encontrado
        <br><br>

        <button id="btnAbrirAgregar">➕ Agregar producto</button>
        <button id="btnCerrarBusqueda">❌ Cerrar</button>
      </div>
    `;

    document.getElementById("btnAbrirAgregar").onclick =
      () => abrirModalAgregar(valor);

    document.getElementById("btnCerrarBusqueda").onclick =
      () => {
        buscar.value = "";
        mostrar(productos);
      };

    return;
  }

  lista.forEach(p => {

    contenedor.innerHTML += `
      <div class="card">

        <img src="${p.imagen || ''}" class="imagen">

        <div class="info">

          <div class="nombre">
            ${p.nombre || "Sin nombre"}
          </div>

          <div class="codigo">
            Código: ${p.codigo}
          </div>

          <div class="precio">
            $${p.precio}
          </div>

        </div>

      </div>
    `;
  });
}

/* ================= ABRIR EDICIÓN (REUTILIZABLE) ================= */
function abrirEdicion(producto){

  const nuevoNombre = prompt("Nombre", producto.nombre || "");
  if(nuevoNombre === null) return;

  const nuevoCodigo = prompt("Código", producto.codigo || "");
  if(nuevoCodigo === null) return;

  const nuevoPrecio = prompt("Precio", producto.precio || "");
  if(nuevoPrecio === null) return;

  const nuevaImagen = prompt("Imagen", producto.imagen || "");
  if(nuevaImagen === null) return;

  setDoc(doc(db, "productos", producto.id), {
    nombre: nuevoNombre,
    codigo: nuevoCodigo,
    precio: Number(nuevoPrecio),
    imagen: nuevaImagen
  })
  .then(() => {
    alert("Producto actualizado");
    cargarProductos();
  })
  .catch(err => {
    console.error(err);
    alert("Error al actualizar");
  });
}

/* ================= BUSCAR ================= */
function buscarProductoPorTexto(texto){

  texto = texto.toLowerCase().trim();

  if(/^\d+$/.test(texto)){

    return productos.find(p =>
      String(p.codigo) === texto
    );

  } else {

    return productos.find(p =>
      (p.nombre || "").toLowerCase().includes(texto)
    );
  }
}

/* ================= CARGAR ================= */
async function cargarProductos(){

  const snap = await getDocs(collection(db, "productos"));

  productos = [];

  snap.forEach(d => {
    productos.push({ id: d.id, ...d.data() });
  });

  document.getElementById("contadorProductos").textContent =
    `Productos: ${productos.length}`;

  mostrar(productos);
}

/* ================= BUSCADOR ================= */
buscar.addEventListener("input", () => {

  const texto = buscar.value;

  if(texto === ""){
    mostrar(productos);
    return;
  }

  const filtrados = productos.filter(p =>
    String(p.codigo).includes(texto) ||
    (p.nombre || "").toLowerCase().includes(texto.toLowerCase())
  );

  mostrar(filtrados);
});

/* ================= LIMPIAR ================= */
limpiar.addEventListener("click", () => {
  buscar.value = "";
  mostrar(productos);
  buscar.focus();
});

/* ================= AGREGAR ================= */
agregar.addEventListener("click", async () => {

  const nombre = prompt("Nombre");
  if(!nombre) return;

  const codigo = prompt("Código");
  if(!codigo) return;

  const precio = prompt("Precio");
  if(!precio) return;

  const imagen = prompt("Imagen") || "";

  await addDoc(collection(db,"productos"),{
    nombre,
    codigo,
    precio:Number(precio),
    imagen
  });

  cargarProductos();
});

/* ================= EDITAR NORMAL ================= */
editar.addEventListener("click", async () => {

  const input = prompt("Código o nombre");
  if(!input) return;

  const producto = buscarProductoPorTexto(input);

  if(!producto){
    alert("Producto no encontrado");
    return;
  }

  abrirEdicion(producto);
});

/* ================= EDITAR CON CÁMARA ================= */
editarCamara.addEventListener("click", async () => {

  lector.style.display = "block";

  if(scanner) return;

  scanner = new ZXing.BrowserMultiFormatReader();

  const devices = await scanner.listVideoInputDevices();

  if(devices.length === 0){
    alert("No hay cámara");
    return;
  }

  const cameraId = devices[0].deviceId;

  scanner.decodeFromVideoDevice(cameraId, "video", (result) => {

    if(result){

      const codigo = result.getText();

      beep();

      const producto = productos.find(p =>
        String(p.codigo) === codigo
      );

      if(!producto){
        alert("No encontrado");
        return;
      }

      scanner.reset();
      scanner = null;
      lector.style.display = "none";

      abrirEdicion(producto);
    }
  });
});

/* ================= CÁMARA NORMAL ================= */
camara.addEventListener("click", async () => {

  lector.style.display = "block";

  if(scanner) return;

  scanner = new ZXing.BrowserMultiFormatReader();

  const devices = await scanner.listVideoInputDevices();

  const cameraId = devices[0].deviceId;

  scanner.decodeFromVideoDevice(cameraId, "video", (result) => {

    if(result){

      const codigo = result.getText();

      beep();

      buscar.value = codigo;
      buscar.dispatchEvent(new Event("input"));
    }
  });
});

/* ================= CERRAR CÁMARA ================= */
cerrarCamara.addEventListener("click", () => {

  if(scanner){
    scanner.reset();
    scanner = null;
  }

  lector.style.display = "none";
});

/* INICIO */
cargarProductos();
buscar.focus();
</script>

</body>
</html>
