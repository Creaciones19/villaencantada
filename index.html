<body>

<header>
💲 VERIFICADOR DE PRECIOS
</header>

<div class="buscador">

    <input
        type="text"
        id="buscar"
        placeholder="Escriba o escanee un código o nombre..."
        autocomplete="off">

    <button id="btnEscanear">
        📷 Escanear
    </button>

    <button id="btnConectar">
    🔌 Conectar lector
</button>


        <button id="btnLimpiar">
    🗑 Limpiar
    </button>

    <button id="btnCerrar">
        ❌ Cerrar cámara
    </button>

</div>

<video
    id="reader"
    autoplay
    playsinline
    muted>
</video>

<div id="resultado">

    <img
        id="foto"
        src="https://via.placeholder.com/300x300?text=Producto"
        alt="Producto">

    <div id="nombre">
        Escanee un producto
    </div>

    <div id="precio">
        --
    </div>

    <div id="codigo">
        Esperando búsqueda...
    </div>

    <div id="noEncontrado">
        ❌ PRODUCTO NO ENCONTRADO
    </div>

</div>

<div id="lista"></div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script type="module">
    /*==================================================
FIREBASE
==================================================*/

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/*==================================================
CONFIGURACIÓN FIREBASE
==================================================*/

const firebaseConfig = {

    apiKey:"AIzaSyBEHWiEWstdu6r2D0i4S3CAu2Eyv1q9aaQ",

    authDomain:"tienda-abarroteslamaravilla.firebaseapp.com",

    projectId:"tienda-abarroteslamaravilla",

    storageBucket:"tienda-abarroteslamaravilla.firebasestorage.app",

    messagingSenderId:"1095327917170",

    appId:"1:1095327917170:web:a3dab096621d695b6e0eeb"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/*==================================================
VARIABLES
==================================================*/

let productos = [];

const hints = new Map();

hints.set(
    ZXing.DecodeHintType.POSSIBLE_FORMATS,
    [
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.UPC_A
    ]
);

let codeReader = new ZXing.BrowserMultiFormatReader(hints);

let camaraAbierta = false;


let escribiendo = false;
//==================================================
// LECTOR SERIAL CP001 COM
//==================================================

let puertoSerial = null;

let lectorSerialActivo = false;

let ultimoCodigoSerial = "";

let tiempoUltimaLecturaSerial = 0;


/*==================================================
ELEMENTOS
==================================================*/

const buscar = document.getElementById("buscar");

const btnEscanear = document.getElementById("btnEscanear");

const btnConectar = document.getElementById("btnConectar");

const btnLimpiar = document.getElementById("btnLimpiar");

const btnCerrar = document.getElementById("btnCerrar");

const reader = document.getElementById("reader");

const foto = document.getElementById("foto");

const nombre = document.getElementById("nombre");

const precio = document.getElementById("precio");

const codigo = document.getElementById("codigo");

const lista = document.getElementById("lista");

const noEncontrado = document.getElementById("noEncontrado");

/*==================================================
CARGAR PRODUCTOS
==================================================*/

async function cargarProductos(){

    productos = [];

    const consulta = await getDocs(collection(db,"productos"));

    consulta.forEach(doc=>{

        productos.push({

            id:doc.id,

            ...doc.data()

        });

    });

    console.log("Productos:",productos.length);

}

window.addEventListener("load",async()=>{

    await cargarProductos();

    buscar.focus();

});
/*==================================================
MOSTRAR PRODUCTO
==================================================*/

function mostrarProducto(producto){

    lista.style.display="none";
    lista.innerHTML="";
    noEncontrado.style.display="none";

    if(!producto){

        foto.src="https://via.placeholder.com/300x300?text=Sin+Imagen";

        nombre.textContent="Producto no encontrado";

        precio.textContent="";

        codigo.textContent="";

        noEncontrado.style.display="block";

        return;

    }

    foto.src=producto.imagen || "https://via.placeholder.com/300x300?text=Sin+Imagen";

    nombre.textContent=producto.nombre;

    precio.textContent="$"+Number(producto.precio).toFixed(2);

    codigo.textContent="Código: "+producto.codigo;

}
/*==================================================
BUSCAR PRODUCTO
==================================================*/
function buscarProducto(texto){

    texto = texto.trim().toLowerCase();

    if(texto===""){

        lista.style.display="none";
        lista.innerHTML="";

        foto.src="https://via.placeholder.com/300x300?text=Producto";
        nombre.textContent="Escanee un producto";
        precio.textContent="--";
        codigo.textContent="Esperando búsqueda...";
        noEncontrado.style.display="none";

        return;
    }

    const encontrados = productos.filter(producto =>

        String(producto.codigo).toLowerCase().includes(texto) ||

        String(producto.nombre).toLowerCase().includes(texto)

    );

    if(encontrados.length > 0){

        mostrarLista(encontrados);

    }else{

        // Mientras escribe NO mostrar "Producto no encontrado"
        lista.style.display = "none";
        lista.innerHTML = "";

    }

}
/*==================================================
MOSTRAR LISTA
==================================================*/

function mostrarLista(resultado){

    lista.innerHTML="";

if(resultado.length===0){

    lista.style.display="none";
    lista.innerHTML="";

    return;

}
    if(resultado.length===1){

        mostrarProducto(resultado[0]);

        return;

    }

    lista.style.display="block";

    resultado.forEach(producto=>{

        const div=document.createElement("div");

        div.className="item";

        div.innerHTML=`

            <img src="${producto.imagen || 'https://via.placeholder.com/150'}">

            <div class="itemNombre">

                ${producto.nombre}

            </div>

            <div class="itemPrecio">

                $${Number(producto.precio).toFixed(2)}

            </div>

        `;

        div.onclick=()=>{

            mostrarProducto(producto);

        };

        lista.appendChild(div);

    });

}
/*==================================================
BUSCAR AL ESCRIBIR
==================================================*/

buscar.addEventListener("input",()=>{

    escribiendo = true;

    reader.style.display = "none";

    buscarProducto(buscar.value);

});
/*==================================================
ENTER (PISTOLA O TECLADO)
==================================================*/
buscar.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        e.preventDefault();

        const texto = buscar.value.trim().toLowerCase();

        const encontrados = productos.filter(producto =>

            String(producto.codigo).toLowerCase().includes(texto) ||

            String(producto.nombre).toLowerCase().includes(texto)

        );

     if(encontrados.length===0){

    beepError();
    mostrarProducto(null);

}else{

    beepCorrecto();
    mostrarLista(encontrados);

}

    }

});
/*==================================================
BEEP
==================================================*/

/*==================================================
BEEP
==================================================*/

let audioCtx = null;

function beep(frecuencia = 1000, duracion = 150){

    try{

        if(!audioCtx){
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if(audioCtx.state === "suspended"){
            audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.value = frecuencia;

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);

        osc.start();

        osc.stop(audioCtx.currentTime + duracion/1000);

    }catch(e){
        console.log(e);
    }

}

function beepCorrecto(){

    beep(1100,120);

}

function beepError(){

    beep(300,350);

}
/*==================================================
BUSCAR CÓDIGO ESCANEADO
==================================================*/
function buscarCodigo(codigoLeido){

    codigoLeido = String(codigoLeido).trim();

    if(codigoLeido === "") return;


    escribiendo = false;

    buscar.value = "";


    lista.innerHTML = "";

    lista.style.display = "none";


    const producto = productos.find(
        p => String(p.codigo) === codigoLeido
    );


    if(producto){

    beepCorrecto();
    mostrarProducto(producto);

}else{

    beepError();
    mostrarProducto(null);

}

}
/*==================================================
INICIAR CÁMARA
==================================================*/
async function iniciarCamara(){

    if(camaraAbierta) return;


    try{

        camaraAbierta = true;


        reader.style.display = "block";


        btnEscanear.style.display = "none";

        btnCerrar.style.display = "inline-block";


const dispositivos = await codeReader.listVideoInputDevices();

let camara = dispositivos[dispositivos.length - 1];

await codeReader.decodeFromConstraints(

{
    video:{
        deviceId:{
            exact: camara.deviceId
        },

        facingMode:"environment",

        width:{
            ideal:1280
        },

        height:{
            ideal:720
        }
    }
},

"reader",

(resultado,error)=>{

    if(resultado){

        buscarCodigo(resultado.getText());

    }

}

);


// ENFOQUE AUTOMÁTICO
const video = document.querySelector("#reader video");

if(video){

    const track = video.srcObject.getVideoTracks()[0];

    const capacidades = track.getCapabilities();

    if(capacidades.focusMode){

        track.applyConstraints({

            advanced:[
                {
                    focusMode:"continuous"
                }
            ]

        });

    }

}


}catch(error){


    console.log("Error cámara:",error);


    camaraAbierta = false;


    reader.style.display = "none";


    btnEscanear.style.display = "inline-block";

    btnCerrar.style.display = "none";


}

}
/*==================================================
CERRAR CÁMARA
==================================================*/

function cerrarCamara(){

    if(!camaraAbierta) return;

    codeReader.reset();

    camaraAbierta = false;

    reader.style.display = "none";

    btnEscanear.style.display = "inline-block";

    btnCerrar.style.display = "none";

}

/*==================================================
BOTONES
==================================================*/

btnEscanear.addEventListener("click",()=>{

    iniciarCamara();

});

btnCerrar.addEventListener("click",()=>{

    cerrarCamara();

});

/*==================================================
CERRAR CÁMARA AL SALIR
==================================================*/

window.addEventListener("beforeunload",()=>{

    cerrarCamara();

});

/*==================================================
BOTON LIMPAR PARA CUANDO SE HACE BUSQUEDA ESCRITA
==================================================*/
btnLimpiar.addEventListener("click",()=>{

    buscar.value="";

    lista.innerHTML="";
    lista.style.display="none";

    foto.src="https://via.placeholder.com/300x300?text=Producto";

    nombre.textContent="Escanee un producto";

    precio.textContent="--";

    codigo.textContent="Esperando búsqueda...";

    noEncontrado.style.display="none";

    buscar.focus();

});
/*==================================================
LECTOR SERIAL CP001
==================================================*/

async function conectarLector(){

    try{

        if(!("serial" in navigator)){

            alert("Este navegador no permite Web Serial. Usa Chrome o Edge.");

            return;

        }


        puertoSerial = await navigator.serial.requestPort();


        await puertoSerial.open({

            baudRate:9600

        });


        lectorSerialActivo = true;


        btnConectar.textContent="✅ Lector conectado";


        console.log("Lector CP001 conectado");


        leerSerial();


    }catch(error){

        console.log("Error conexión lector:",error);

    }

}



/*==================================================
LECTURA CONTINUA COM3
==================================================*/

async function leerSerial(){


    const decoder = new TextDecoderStream();


    puertoSerial.readable.pipeTo(
        decoder.writable
    );


    const lector = decoder.readable.getReader();


    let buffer="";


    while(lectorSerialActivo){


        const {value,done}=await lector.read();


        if(done){

            break;

        }


        if(value){


            buffer += value;


            if(
                buffer.includes("\n") ||
                buffer.includes("\r")
            ){


                let codigoLeido = buffer.trim();


                buffer="";


                if(codigoLeido!=""){


                    let ahora = Date.now();


                    // evita doble lectura inmediata

                    if(

                        codigoLeido !== ultimoCodigoSerial ||

                        ahora - tiempoUltimaLecturaSerial > 800

                    ){


                        ultimoCodigoSerial = codigoLeido;

                        tiempoUltimaLecturaSerial = ahora;


                        console.log(
                            "Código serial:",
                            codigoLeido
                        );


                        buscarCodigo(codigoLeido);


                    }


                }


            }


        }


    }


}



/*==================================================
BOTÓN CONECTAR LECTOR
==================================================*/

btnConectar.addEventListener("click",()=>{

    conectarLector();

});
   </script>
