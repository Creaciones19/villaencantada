
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f3f3f3;
    padding:20px;
}

/* HEADER */

.header{
    margin-bottom:25px;
}

.titulo{
    font-size:32px;
    color:#222;
    margin-bottom:15px;
    font-weight:bold;
}

/* BUSCADOR */

.contenedor-busqueda{

    display:flex;
    gap:12px;
    align-items:center;

}

.buscador{

    flex:1;

    height:58px;

    padding:0 20px;

    border:1px solid #ddd;
    border-radius:14px;

    background:white;

    color:#222;

    font-size:17px;

    outline:none;

}

.buscador:focus{
    border-color:#f5c400;
}

/* BOTÓN */

.limpiar,
.contador{

    height:58px;

    padding:0 24px;

    border:none;
    border-radius:14px;

    background:#ff30a2;

    color:white;

    font-size:16px;
    font-weight:bold;

    display:flex;

    align-items:center;

    justify-content:center;

    white-space:nowrap;

    transition:.2s;

}

.limpiar:hover{

    transform:scale(1.03);

}

/* PRODUCTOS */

.productos{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

    gap:20px;
}

/* CARD */

.card{
    background:white;
    border-radius:8px;
    padding:12px;
    transition:.2s;
    border:1px solid #e5e5e5;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* IMAGEN */

.imagen{
    width:100%;
    height:140px;
    object-fit:contain;
    background:#fafafa;
    margin-bottom:10px;
}

/* INFO */

.info{
    text-align:center;
}

.nombre{
    font-size:16px;
    font-weight:bold;
    color:#222;
    margin-bottom:6px;
}

.codigo{
    font-size:13px;
    color:#777;
    margin-bottom:10px;
}

.precio{
    background:#ffd400;
    color:#111;
    display:inline-block;
    padding:8px 18px;
    font-size:26px;
    font-weight:bold;
    border-radius:6px;
}
/* =========================
   RESPONSIVE DESIGN
========================= */
@media (max-width: 768px){

    body{
        padding:12px;
    }

    .titulo{
        font-size:24px;
        text-align:center;
    }

    .contenedor-busqueda{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        align-items:stretch;
    }

    .buscador{
        width:100%;
        flex:none;
        height:52px;
        font-size:16px;
    }

    .limpiar{
        width:calc(50% - 4px);
        height:42px;
        font-size:13px;
        padding:0 8px;
    }

    .productos{
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:12px;
    }

    .imagen{
        height:110px;
    }

    .precio{
        font-size:20px;
        padding:6px 14px;
    }

    #lector{
        width:100% !important;
        max-width:350px;
    }
}

@media (max-width: 480px){
 
    .productos{
        grid-template-columns:repeat(2,1fr);
    }

    .titulo{
        font-size:20px;
    }

    .card{
        padding:10px;
    }

    .nombre{
        font-size:14px;
    }

    .codigo{
        font-size:12px;
    }

    .precio{
        font-size:18px;
    }
}

</style>
</head>
<body>

<div class="titulo">
    Buscar Productos
</div>

<div class="contenedor-busqueda">

    <input
    type="text"
    id="buscar"
    class="buscador"
    placeholder="Escanee o escriba producto...">

    <button
    id="limpiar"
    class="limpiar">
        Borrar
    </button>

    <button
    id="camara"
    class="limpiar">
        📷 Escanear
    </button>
<div
id="lector"
style="
display:none;
width:300px;
margin-top:10px;
">
    <video
    id="video"
    style="width:100%;">
    </video>
</div>
    <button
    id="cerrarCamara"
    class="limpiar">
        Cerrar cámara
    </button>

    <button
    id="agregar"
    class="limpiar">
        Agregar producto
</button>

<button
    id="editar"
    class="limpiar">
        Editar
</button>

<div
    id="contadorProductos"
    class="contador">
    Productos: 0
</div>

</div>

<div
class="productos"
id="productos">
</div>
<script src="https://unpkg.com/@zxing/library@latest"></script>

    
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  addDoc,
  getDocs,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBEHWiEWstdu6r2D0i4S3CAu2Eyv1q9aaQ",
  authDomain: "tienda-abarroteslamaravilla.firebaseapp.com",
  projectId: "tienda-abarroteslamaravilla",
  storageBucket: "tienda-abarroteslamaravilla.firebasestorage.app",
  messagingSenderId: "1095327917170",
  appId: "1:1095327917170:web:a3dab096621d695b6e0eeb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SONIDO */
function beep() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

/* VARIABLES */
let productos = [];
let scanner = null;

const contenedor = document.getElementById("productos");
const buscar = document.getElementById("buscar");
const limpiar = document.getElementById("limpiar");
const camara = document.getElementById("camara");
const cerrarCamara = document.getElementById("cerrarCamara");
const agregar = document.getElementById("agregar");
const editar = document.getElementById("editar");
const lector = document.getElementById("lector");

/* MOSTRAR */
function mostrar(lista){
  contenedor.innerHTML = "";

  lista.forEach(p=>{
    contenedor.innerHTML += `
      <div class="card">
        <img src="${p.imagen || ''}" class="imagen">
        <div class="info">
          <div class="nombre">${p.nombre}</div>
          <div class="codigo">${p.codigo}</div>
          <div class="precio">$${p.precio}</div>
        </div>
      </div>
    `;
  });
}

/* CARGAR */
async function cargarProductos(){
  const snap = await getDocs(collection(db,"productos"));

  productos = [];
  snap.forEach(d=>{
    productos.push({ id:d.id, ...d.data() });
  });

  mostrar(productos);
}

cargarProductos();

/* BUSCADOR */
buscar.addEventListener("input", ()=>{
  const t = buscar.value.toLowerCase().trim();

  if(!t) return mostrar(productos);

  mostrar(productos.filter(p =>
    String(p.codigo).toLowerCase().includes(t) ||
    (p.nombre||"").toLowerCase().includes(t)
  ));
});

/* LIMPIAR */
limpiar.addEventListener("click", ()=>{
  buscar.value = "";
  mostrar(productos);
});

/* CÁMARA (ARREGLADA) */
camara.addEventListener("click", async ()=>{

  try{

    lector.style.display = "block";

    if(scanner){
      scanner.reset();
      scanner = null;
    }

    scanner = new ZXing.BrowserMultiFormatReader();

    const devices = await scanner.listVideoInputDevices();

    if(!devices.length){
      alert("No hay cámara");
      return;
    }

    const cameraId = devices[0].deviceId;

    scanner.decodeFromVideoDevice(
      cameraId,
      "video",
      (result)=>{
        if(result){

          const codigo = result.getText();

          beep();
          buscar.value = codigo;
          buscar.dispatchEvent(new Event("input"));

          scanner.reset();
          scanner = null;
        }
      }
    );

  }catch(e){
    alert("Error cámara");
  }

});

/* CERRAR CÁMARA */
cerrarCamara.addEventListener("click", ()=>{
  if(scanner){
    scanner.reset();
    scanner = null;
  }
  lector.style.display = "none";
});

/* AGREGAR */
agregar.addEventListener("click", async ()=>{

  const nombre = prompt("Nombre");
  if(!nombre) return;

  const codigo = prompt("Código");
  if(!codigo) return;

  const precio = prompt("Precio");
  if(!precio) return;

  const imagen = prompt("Imagen") || "";

  await addDoc(collection(db,"productos"),{
    nombre,
    codigo,
    precio:Number(precio),
    imagen
  });

  cargarProductos();
});

/* EDITAR (ARREGLADO SIN ERRORES) */
editar.addEventListener("click", ()=>{

const op = prompt(
"¿Desea editar?\n\n1 = Con cámara\n2 = Por nombre o código"
);
if(!op) return;

  if(op==="1"){
    camara.click();
    return;
  }

  if(op==="2"){

    const q = prompt("Código o nombre");
    if(!q) return;

    const t = q.toLowerCase();

    const p = productos.find(x =>
      String(x.codigo).toLowerCase().includes(t) ||
      (x.nombre||"").toLowerCase().includes(t)
    );

    if(!p){
      alert("No encontrado");
      return;
    }

    const nombre = prompt("Nombre", p.nombre);
    const codigo = prompt("Código", p.codigo);
    const precio = prompt("Precio", p.precio);
    const imagen = prompt("Imagen", p.imagen);

    setDoc(doc(db,"productos",p.id),{
      nombre,
      codigo,
      precio:Number(precio),
      imagen
    });

    cargarProductos();
  }

});

</script>

</body>
</html>
