```html
<script>

const video = document.getElementById("video");
const resultado = document.getElementById("resultado");

document.getElementById("iniciar").addEventListener("click", async ()=>{

    try{

        if(!("BarcodeDetector" in window)){

            alert("BarcodeDetector NO disponible");

            return;
        }

        const devices =
        await navigator.mediaDevices.enumerateDevices();

        const cams =
        devices.filter(
            d => d.kind === "videoinput"
        );

        alert(
            "Camaras encontradas: " +
            cams.length
        );

        const stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:{
                    ideal:"environment"
                },
                width:{
                    ideal:1920
                },
                height:{
                    ideal:1080
                }
            }

        });

        video.srcObject = stream;

        video.onloadedmetadata = ()=>{

            resultado.innerHTML =
            "Video: " +
            video.videoWidth +
            " x " +
            video.videoHeight;

        };

        const detector =
        new BarcodeDetector({

            formats:[
                "ean_13",
                "ean_8",
                "code_128",
                "code_39",
                "upc_a",
                "upc_e",
                "qr_code"
            ]

        });

        setInterval(async ()=>{

            try{

                const codigos =
                await detector.detect(video);

                if(codigos.length){

                    resultado.innerHTML =
                    "Código: " +
                    codigos[0].rawValue;

                }else{

                    resultado.innerHTML =
                    "Detectados: 0";

                }

            }catch(error){

                console.log(error);

            }

        },500);

    }catch(error){

        alert(error.message);

        console.log(error);

    }

});

</script>
